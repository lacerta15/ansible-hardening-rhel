---
- name: Install auditd
  package:
    name: audit
    state: present

- name: Configure audit rules
  template:
    src: audit.rules.j2
    dest: /etc/audit/rules.d/cis-hardening.rules
    owner: root
    group: root
    mode: '0640'
  notify: restart auditd

- name: Enable auditd
  service:
    name: auditd
    state: started
    enabled: yes
