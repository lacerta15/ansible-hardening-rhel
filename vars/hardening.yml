# CIS Hardening Variables
ssh_max_auth_tries: 4
ssh_permit_root_login: "no"
ssh_password_authentication: "no"
ssh_client_alive_interval: 300
ssh_client_alive_count_max: 0

firewall_allowed_services:
  - ssh
  - https

audit_log_size: 50
audit_log_format: ENRICHED
audit_disk_full_action: SUSPEND

pam_pass_min_length: 14
pam_pass_min_days: 1
pam_pass_max_days: 90
pam_lockout_attempts: 5
pam_lockout_duration: 900
